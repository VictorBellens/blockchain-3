<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Tickets — Web2</title>
  <style>
    :root { --bg:#0f172a; --surface:#1e293b; --border:#334155; --accent:#a78bfa;
      --accent2:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --success:#22c55e; --error:#ef4444; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    header { background:var(--surface); border-bottom:1px solid var(--border);
      padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
    header h1 { font-size:1.3rem; }
    header .badge { background:var(--accent); color:#000; padding:2px 8px; border-radius:4px; font-size:0.7rem; font-weight:700; margin-left:0.5rem; }

    .user-select { display:flex; gap:0.5rem; align-items:center; }
    .user-select select { padding:0.4rem; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); }

    .container { max-width:1100px; margin:1.5rem auto; padding:0 1rem; }
    .tabs { display:flex; gap:0; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
    .tab { padding:0.7rem 1.5rem; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; font-weight:600; }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    .section { display:none; }
    .section.active { display:block; }
    .section-title { font-size:1rem; margin-bottom:1rem; color:var(--accent2); }

    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; margin-bottom:1.5rem; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.2rem; }
    .card h3 { margin-bottom:0.3rem; }
    .card .meta { color:var(--muted); font-size:0.85rem; margin-bottom:0.7rem; line-height:1.6; }
    .card .meta span { display:block; }

    .btn { padding:0.45rem 0.9rem; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-size:0.82rem; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-accent { background:var(--accent2); color:#000; }
    .btn-danger { background:var(--error); color:#fff; }
    .btn:hover { opacity:0.9; }
    .btn:disabled { opacity:0.3; cursor:not-allowed; }

    .row { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
    input[type=text], input[type=number], input[type=date] {
      padding:0.4rem; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); }

    table { width:100%; border-collapse:collapse; margin-top:0.5rem; }
    th, td { padding:0.5rem 0.8rem; text-align:left; border-bottom:1px solid var(--border); font-size:0.85rem; }
    th { color:var(--muted); }

    .toast { position:fixed; bottom:1rem; right:1rem; padding:0.8rem 1.2rem; border-radius:8px;
      font-size:0.85rem; font-weight:600; z-index:999; animation:fade 3s forwards; }
    .toast.success { background:var(--success); color:#fff; }
    .toast.error { background:var(--error); color:#fff; }
    @keyframes fade { 0%,70%{opacity:1} 100%{opacity:0} }
    .empty { color:var(--muted); font-style:italic; }

    .admin-form { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.2rem; margin-bottom:1.5rem; }
    .admin-form h3 { color:var(--accent); margin-bottom:0.8rem; }
    .form-row { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; margin-bottom:0.5rem; }
    .form-row label { font-size:0.85rem; color:var(--muted); width:90px; }
    .form-row input { flex:1; max-width:200px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Event Tickets<span class="badge">WEB2</span></h1>
    </div>
    <div class="user-select">
      <label>Logged in as:</label>
      <select id="userSelect"></select>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <div class="tab active" data-tab="events">Events</div>
      <div class="tab" data-tab="mytickets">My Tickets</div>
      <div class="tab" data-tab="marketplace">Marketplace</div>
      <div class="tab" data-tab="admin">Admin</div>
    </div>

    <!-- EVENTS TAB -->
    <div class="section active" id="sec-events">
      <h2 class="section-title">Upcoming Events</h2>
      <div id="eventsList" class="card-grid"></div>
    </div>

    <!-- MY TICKETS TAB -->
    <div class="section" id="sec-mytickets">
      <h2 class="section-title">Your Tickets</h2>
      <div id="myTickets"></div>
    </div>

    <!-- MARKETPLACE TAB -->
    <div class="section" id="sec-marketplace">
      <h2 class="section-title">Resale Marketplace</h2>
      <div id="marketplace" class="card-grid"></div>
    </div>

    <!-- ADMIN TAB -->
    <div class="section" id="sec-admin">
      <div id="adminGate"></div>
      <div class="admin-form" id="adminForm" style="display:none">
        <h3>Create New Event</h3>
        <div class="form-row"><label>Name:</label><input type="text" id="evName" /></div>
        <div class="form-row"><label>Date:</label><input type="date" id="evDate" /></div>
        <div class="form-row"><label>Venue:</label><input type="text" id="evVenue" /></div>
        <div class="form-row"><label>Price ($):</label><input type="number" id="evPrice" min="1" value="50" /></div>
        <div class="form-row"><label>Tickets:</label><input type="number" id="evTotal" min="1" value="100" /></div>
        <div class="form-row"><button class="btn btn-primary" id="createEventBtn">Create Event</button></div>
      </div>
    </div>
  </div>

  <script>
    const API = "";
    let currentUser = null;
    let users = [];

    function toast(msg, type = "success") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }

    async function api(url, opts) {
      const res = await fetch(API + url, { headers: { "Content-Type": "application/json" }, ...opts });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    // Tabs
    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
        document.querySelectorAll(".section").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        document.getElementById("sec-" + t.dataset.tab).classList.add("active");
        refresh();
      });
    });

    // User selector
    async function loadUsers() {
      users = await api("/api/users");
      const sel = document.getElementById("userSelect");
      sel.innerHTML = "";
      for (const u of users) {
        const o = document.createElement("option");
        o.value = u.id;
        o.textContent = u.username + (u.is_admin ? " (admin)" : "");
        sel.appendChild(o);
      }
      currentUser = users[0];
      sel.addEventListener("change", () => {
        currentUser = users.find((u) => u.id === parseInt(sel.value));
        refresh();
      });
    }

    async function loadEvents() {
      const events = await api("/api/events");
      const el = document.getElementById("eventsList");
      if (events.length === 0) { el.innerHTML = '<p class="empty">No events yet.</p>'; return; }
      el.innerHTML = events.map((e) => `
        <div class="card">
          <h3>${e.name}</h3>
          <div class="meta">
            <span>Date: ${e.date}</span>
            <span>Venue: ${e.venue}</span>
            <span>Price: $${e.ticket_price}</span>
            <span>Available: ${e.available} / ${e.total_tickets}</span>
          </div>
          <button class="btn btn-primary" onclick="buyTicket(${e.id})" ${e.available <= 0 ? "disabled" : ""}>
            ${e.available > 0 ? "Buy Ticket" : "Sold Out"}
          </button>
        </div>`).join("");
    }

    async function loadMyTickets() {
      if (!currentUser) return;
      const tickets = await api(`/api/tickets/${currentUser.id}`);
      const el = document.getElementById("myTickets");
      if (tickets.length === 0) { el.innerHTML = '<p class="empty">No tickets yet.</p>'; return; }
      el.innerHTML = `<table><thead><tr><th>ID</th><th>Event</th><th>Date</th><th>Venue</th><th>Status</th><th>Actions</th></tr></thead><tbody>${tickets.map((t) => `
        <tr>
          <td>#${t.id}</td>
          <td>${t.event_name}</td>
          <td>${t.event_date}</td>
          <td>${t.venue}</td>
          <td>${t.is_for_sale ? "Listed ($" + t.resale_price + ")" : "Owned"}</td>
          <td class="row">
            ${!t.is_for_sale ? `
              <input type="number" id="resalePrice-${t.id}" placeholder="$" min="1" style="width:60px" />
              <button class="btn btn-accent" onclick="listForSale(${t.id})">List</button>
              <select id="transferTo-${t.id}" style="max-width:100px">${users.filter(u => u.id !== currentUser.id).map(u => `<option value="${u.id}">${u.username}</option>`).join("")}</select>
              <button class="btn btn-danger" onclick="transferTicket(${t.id})">Transfer</button>
            ` : "On sale"}
          </td>
        </tr>`).join("")}</tbody></table>`;
    }

    async function loadMarketplace() {
      const tickets = await api("/api/marketplace");
      const el = document.getElementById("marketplace");
      if (tickets.length === 0) { el.innerHTML = '<p class="empty">No tickets for resale.</p>'; return; }
      el.innerHTML = tickets.map((t) => `
        <div class="card">
          <h3>${t.event_name}</h3>
          <div class="meta">
            <span>Date: ${t.event_date}</span>
            <span>Seller: ${t.seller}</span>
            <span>Price: $${t.resale_price}</span>
          </div>
          <button class="btn btn-primary" onclick="buyResale(${t.id})"
            ${t.owner_id === currentUser?.id ? "disabled" : ""}>
            ${t.owner_id === currentUser?.id ? "Your listing" : "Buy"}
          </button>
        </div>`).join("");
    }

    function loadAdmin() {
      const gate = document.getElementById("adminGate");
      const form = document.getElementById("adminForm");
      if (currentUser?.is_admin) {
        gate.innerHTML = "";
        form.style.display = "block";
      } else {
        gate.innerHTML = '<p class="empty">Admin access required.</p>';
        form.style.display = "none";
      }
    }

    async function refresh() {
      await Promise.all([loadEvents(), loadMyTickets(), loadMarketplace(), loadAdmin()]);
    }

    // Actions
    window.buyTicket = async (eventId) => {
      try {
        const res = await api("/api/tickets/buy", { method: "POST", body: JSON.stringify({ user_id: currentUser.id, event_id: eventId }) });
        toast(res.message);
        refresh();
      } catch (e) { toast(e.message, "error"); }
    };

    window.listForSale = async (ticketId) => {
      const price = parseFloat(document.getElementById(`resalePrice-${ticketId}`).value);
      if (!price || price <= 0) { toast("Enter a valid price", "error"); return; }
      try {
        const res = await api("/api/tickets/list-for-sale", { method: "POST", body: JSON.stringify({ user_id: currentUser.id, ticket_id: ticketId, resale_price: price }) });
        toast(res.message);
        refresh();
      } catch (e) { toast(e.message, "error"); }
    };

    window.buyResale = async (ticketId) => {
      try {
        const res = await api("/api/tickets/buy-resale", { method: "POST", body: JSON.stringify({ buyer_id: currentUser.id, ticket_id: ticketId }) });
        toast(res.message);
        refresh();
      } catch (e) { toast(e.message, "error"); }
    };

    window.transferTicket = async (ticketId) => {
      const recipientId = parseInt(document.getElementById(`transferTo-${ticketId}`).value);
      try {
        const res = await api("/api/tickets/transfer", { method: "POST", body: JSON.stringify({ owner_id: currentUser.id, ticket_id: ticketId, recipient_id: recipientId }) });
        toast(res.message);
        refresh();
      } catch (e) { toast(e.message, "error"); }
    };

    document.getElementById("createEventBtn").addEventListener("click", async () => {
      try {
        const body = {
          user_id: currentUser.id,
          name: document.getElementById("evName").value,
          date: document.getElementById("evDate").value,
          venue: document.getElementById("evVenue").value,
          ticket_price: parseFloat(document.getElementById("evPrice").value),
          total_tickets: parseInt(document.getElementById("evTotal").value),
        };
        const res = await api("/api/events", { method: "POST", body: JSON.stringify(body) });
        toast(res.message);
        refresh();
      } catch (e) { toast(e.message, "error"); }
    });

    // Init
    loadUsers().then(refresh);
  </script>
</body>
</html>
